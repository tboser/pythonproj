name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install just
        run: |
          curl -sSL https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Install template tester deps
        run: uv sync --all-extras

      - name: Run generation tests
        run: uv run pytest -v
