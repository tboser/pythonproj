name: Mutation testing

on:
  schedule:
    - cron: "0 4 * * 0"  # Sundays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutmut:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mutmut
        run: uv run mutmut run --max-children=4 || true

      - name: Show surviving mutants
        run: uv run mutmut results

      - name: Upload mutmut cache as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-cache
          path: .mutmut-cache
          retention-days: 14
